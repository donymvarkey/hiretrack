    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "HireTrack",
        "description": "Track your job applications, interviews, and follow-ups in one organized place.",
        "url": "https://hiretrack.app/",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web, iOS, Android",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
    <script>
      // Apply the saved theme before paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var stored = localStorage.getItem('hiretrack-theme') || 'dark';
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = stored === 'dark' || (stored === 'system' && prefersDark);
          var root = document.documentElement;
          root.classList.toggle('dark', dark);
          root.style.colorScheme = dark ? 'dark' : 'light';
        } catch (e) {}
      })();
    </script>

  <body>
    <div id="root">
      <!-- Launch splash: shown instantly before the app boots, removed by React on mount -->
      <div id="app-splash">
        <div class="app-splash__logo">
          <svg width="40" height="40" viewBox="0 0 512 512" fill="none" stroke="#fff" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="128" y="190" width="256" height="170" rx="28" />
            <path d="M206 190v-26a26 26 0 0 1 26-26h48a26 26 0 0 1 26 26v26" />
            <path d="M128 250h256" />
          </svg>
        </div>
        <span class="app-splash__name">HireTrack</span>
        <span class="app-splash__spinner" aria-hidden="true"></span>
      </div>
    </div>
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: linear-gradient(135deg, #4f46e5, #8b5cf6);
        z-index: 9999;
      }
      .app-splash__logo {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 76px;
        height: 76px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.16);
      }
      .app-splash__name {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.2px;
        color: #fff;
      }
      .app-splash__spinner {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.35);
        border-top-color: #fff;
        animation: app-splash-spin 0.7s linear infinite;
      }
      @keyframes app-splash-spin {
        to { transform: rotate(360deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        .app-splash__spinner { animation-duration: 1.6s; }
      }
    </style>
    <script type="module" src="/src/main.tsx"></script>
